<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 合约监控 v4.5 Pro - 三周期极速</title>
<style>
  :root {
    --bg:#0a0e1a; --panel:#111827; --card-bg:#141d2e;
    --border:#1e2d45; --text:#c8d4e8; --text2:#7a8fa8;
    --green:#00e676; --red:#ff4081; --yellow:#ffd740;
    --blue:#40c4ff; --purple:#ce93d8; --orange:#ff9800;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh;}

  /* Header */
  .header{background:linear-gradient(135deg,#0d1b35,#0a1628);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .header h1{font-size:19px;font-weight:700;color:#fff;}
  .header h1 span{color:var(--yellow);}
  .scan-info{font-size:12px;color:var(--text2);}
  .scan-info b{color:var(--blue);}
  .live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;margin-right:6px;}
  .live-dot.disconnected{background:var(--red);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* Progress */
  .progress-bar{height:3px;background:var(--border);position:fixed;top:0;left:0;right:0;z-index:1000;display:none;}
  .progress-bar.show{display:block;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));width:0%;transition:width 0.3s;}

  /* Stats */
  .stats-bar{display:flex;gap:12px;padding:10px 28px;background:var(--panel);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
  .stat-item{display:flex;flex-direction:column;align-items:center;padding:7px 16px;border-radius:8px;min-width:90px;}
  .stat-item.green{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);}
  .stat-item.red{background:rgba(255,64,129,.1);border:1px solid rgba(255,64,129,.3);}
  .stat-item.gray{background:rgba(120,144,156,.1);border:1px solid rgba(120,144,156,.3);}
  .stat-item.orange{background:rgba(255,152,0,.1);border:1px solid rgba(255,152,0,.3);}
  .stat-num{font-size:24px;font-weight:700;}
  .stat-item.green .stat-num{color:var(--green);}
  .stat-item.red .stat-num{color:var(--red);}
  .stat-item.gray .stat-num{color:#90a4ae;}
  .stat-item.orange .stat-num{color:var(--orange);}
  .stat-label{font-size:11px;color:var(--text2);margin-top:2px;}

  /* Alert */
  .alert-bar{padding:7px 28px;background:rgba(255,152,0,.1);border-bottom:1px solid rgba(255,152,0,.3);font-size:12px;color:var(--orange);display:none;}
  .alert-bar.show{display:block;}

  /* Toolbar */
  .toolbar{display:flex;gap:10px;padding:10px 28px;background:var(--panel);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
  .toolbar label{font-size:12px;color:var(--text2);}
  .sort-btn{padding:5px 14px;border:1px solid var(--border);border-radius:6px;background:rgba(255,255,255,.04);color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s;}
  .sort-btn:hover,.sort-btn.active{background:rgba(64,196,255,.12);color:var(--blue);border-color:rgba(64,196,255,.4);}
  .filter-select{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:#111827;color:var(--text);font-size:12px;cursor:pointer;}

  /* Legend */
  .legend{display:flex;gap:14px;padding:8px 28px;flex-wrap:wrap;font-size:11px;color:var(--text2);background:var(--panel);border-bottom:1px solid var(--border);}

  /* Tabs */
  .tabs{display:flex;gap:0;padding:0 28px;margin-top:14px;}
  .tab-btn{padding:8px 22px;cursor:pointer;border:none;background:var(--panel);color:var(--text2);font-size:13px;font-weight:600;border-radius:8px 8px 0 0;margin-right:4px;border:1px solid var(--border);border-bottom:none;transition:all .2s;}
  .tab-btn.active-long{background:rgba(0,230,118,.15);color:var(--green);border-color:rgba(0,230,118,.4);}
  .tab-btn.active-short{background:rgba(255,64,129,.15);color:var(--red);border-color:rgba(255,64,129,.4);}
  .tab-btn.active-warn{background:rgba(255,152,0,.12);color:var(--orange);border-color:rgba(255,152,0,.4);}
  .tab-btn.active-all{background:rgba(64,196,255,.1);color:var(--blue);border-color:rgba(64,196,255,.3);}

  /* Panels */
  .tab-panel{display:none;padding:18px 28px 40px;}
  .tab-panel.active{display:block;}

  /* Grid */
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(390px,1fr));gap:14px;}

  /* Card */
  .card{background:var(--card-bg);border-radius:12px;overflow:hidden;border:1px solid var(--border);transition:transform .2s,box-shadow .2s;position:relative;}
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.5);}
  .card-long{border-top:3px solid var(--green);}
  .card-short{border-top:3px solid var(--red);}
  .card-warn{border-top:3px solid var(--orange);}
  .card-neutral{border-top:3px solid #37474f;}
  .card-flash_long{border-top:3px solid #00e676;box-shadow:0 0 15px rgba(0,230,118,.3);}
  .card-flash_short{border-top:3px solid #ff4081;box-shadow:0 0 15px rgba(255,64,129,.3);}
  
  /* 止盈止损样式 */
  .sltp-row{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;}
  .sltp-item{font-size:10.5px;padding:3px 8px;border-radius:5px;font-weight:600;}
  .sltp-tp{background:rgba(0,230,118,.12);color:#00e676;border:1px solid rgba(0,230,118,.3);}
  .sltp-sl{background:rgba(255,64,129,.12);color:#ff4081;border:1px solid rgba(255,64,129,.3);}
  .sltp-entry{background:rgba(64,196,255,.12);color:#40c4ff;border:1px solid rgba(64,196,255,.3);}

  /* Card Header */
  .card-header{padding:11px 15px 9px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border);}
  .symbol-name{font-size:18px;font-weight:700;color:#fff;}
  .usdt{font-size:11px;color:var(--text2);}
  .trend-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:rgba(64,196,255,.1);color:var(--blue);border:1px solid rgba(64,196,255,.3);margin-left:7px;white-space:nowrap;}
  .current-price{font-size:16px;font-weight:700;color:#fff;display:block;text-align:right;}
  .change{font-size:12px;font-weight:600;}
  .pos{color:var(--green);}.neg{color:var(--red);}
  .price-updating{color:var(--yellow) !important;}

  /* Risk Badge */
  .risk-badge{position:absolute;top:10px;right:10px;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;}
  .risk-high{background:rgba(255,64,129,.2);color:var(--red);border:1px solid rgba(255,64,129,.4);}
  .risk-mid{background:rgba(255,152,0,.2);color:var(--orange);border:1px solid rgba(255,152,0,.4);}
  .risk-low{background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.3);}

  /* Meta */
  .card-meta{padding:6px 15px;font-size:11px;color:var(--text2);display:flex;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
  .card-meta b{color:var(--text);}
  .fee-high{color:#ff9800 !important;font-weight:700;}
  .fee-neg-high{color:#e040fb !important;font-weight:700;}

  /* Signal */
  .signal-section{padding:8px 15px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
  .badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;}
  .badge.long{background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.4);}
  .badge.short{background:rgba(255,64,129,.15);color:var(--red);border:1px solid rgba(255,64,129,.4);}
  .badge.warn{background:rgba(255,152,0,.15);color:var(--orange);border:1px solid rgba(255,152,0,.4);}
  .badge.neutral{background:rgba(120,144,156,.1);color:#90a4ae;border:1px solid rgba(120,144,156,.3);}
  .score-bar-wrap{flex:1;height:7px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;}
  .score-bar{height:100%;border-radius:4px;transition:width .5s;}

  /* Snapshot */
  .snapshot-row{display:flex;flex-wrap:wrap;gap:5px;padding:6px 15px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);}
  .snap-item{font-size:11px;color:var(--text2);background:rgba(255,255,255,.04);border-radius:4px;padding:2px 7px;}
  .snap-item b{color:var(--text);margin-right:3px;}
  .snap-item.highlight{background:rgba(255,152,0,.12);border:1px solid rgba(255,152,0,.3);}

  /* Warnings */
  .trap-warning{padding:5px 15px;background:rgba(255,64,129,.07);border-bottom:1px solid rgba(255,64,129,.2);font-size:11px;color:#ff6090;display:flex;align-items:center;gap:5px;}
  .fee-warning{padding:5px 15px;background:rgba(255,152,0,.07);border-bottom:1px solid rgba(255,152,0,.2);font-size:11px;color:var(--orange);display:flex;align-items:center;gap:5px;}

  /* Details */
  .details-section{padding:6px 11px;max-height:190px;overflow-y:auto;}
  .det-item{display:flex;align-items:center;gap:5px;padding:3px 5px;border-radius:5px;margin-bottom:3px;font-size:11px;}
  .det-bull{background:rgba(0,230,118,.07);}
  .det-bear{background:rgba(255,64,129,.07);}
  .det-neutral{background:rgba(255,255,255,.03);}
  .det-icon{font-size:12px;min-width:13px;}
  .det-bull .det-icon{color:var(--green);}
  .det-bear .det-icon{color:var(--red);}
  .det-neutral .det-icon{color:var(--text2);}
  .det-name{font-weight:600;min-width:120px;color:var(--text);}
  .det-desc{color:var(--text2);font-size:10.5px;}
  .details-section::-webkit-scrollbar{width:4px;}
  .details-section::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

  /* Action */
  .action-section{padding:8px 15px;background:rgba(255,255,255,.02);border-top:1px solid var(--border);}
  .action-text{font-size:12px;color:var(--yellow);line-height:1.65;}
  .action-tp{color:var(--green);font-weight:600;}
  .action-sl{color:var(--red);font-weight:600;}

  /* SLTP */
  .sltp-row{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap;}
  .sltp-item{font-size:11px;padding:3px 10px;border-radius:6px;font-weight:600;}
  .sltp-tp{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.25);}
  .sltp-sl{background:rgba(255,64,129,.1);color:var(--red);border:1px solid rgba(255,64,129,.25);}
  .sltp-pos{background:rgba(64,196,255,.1);color:var(--blue);border:1px solid rgba(64,196,255,.25);}

  /* Footer */
  .card-footer{padding:4px 15px;font-size:10px;color:var(--text2);background:rgba(0,0,0,.2);display:flex;justify-content:space-between;}
  .copy-btn{font-size:10px;color:var(--blue);cursor:pointer;border:none;background:transparent;padding:0;}
  .copy-btn:hover{text-decoration:underline;}

  .empty-msg{color:var(--text2);text-align:center;padding:40px;font-size:14px;}
  .loading-msg{color:var(--blue);text-align:center;padding:20px;font-size:14px;}

  @media(max-width:768px){
    .header,.stats-bar,.tabs,.tab-panel,.legend,.toolbar{padding-left:12px;padding-right:12px;}
    .cards-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div class="progress-bar" id="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

<div class="header">
  <h1>🔥 加密合约 <span>实时监控</span> <small style="font-size:13px;color:#7a8fa8;font-weight:400">v4.5 Pro 三周期</small> <small style="font-size:11px;color:var(--green);margin-left:8px;">🔴 LIVE</small></h1>
  <div class="scan-info">
    <span class="live-dot" id="ws-status"></span>
    品种: <b id="sym-count">0</b> | 
    数据: <b id="data-status">初始化...</b> | 
    <span id="last-update"></span>
  </div>
</div>

<div class="alert-bar" id="fee-alert">
  ⚠️ 资金费率预警：<span id="fee-warn-text">加载中...</span>
</div>

<div class="stats-bar">
  <div class="stat-item" style="background:rgba(255,64,129,.1);border:1px solid rgba(255,64,129,.3);"><span class="stat-num" style="color:#ff4081" id="cnt-flash_short">0</span><span class="stat-label">⚡ 极速做空</span></div>
  <div class="stat-item red"><span class="stat-num" id="cnt-short">0</span><span class="stat-label">📉 做空信号</span></div>
  <div class="stat-item orange"><span class="stat-num" id="cnt-warn">0</span><span class="stat-label">⚠️ 超卖陷阱</span></div>
  <div class="stat-item green"><span class="stat-num" id="cnt-long">0</span><span class="stat-label">🚀 做多信号</span></div>
  <div class="stat-item" style="background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);"><span class="stat-num" style="color:#00e676" id="cnt-flash_long">0</span><span class="stat-label">⚡ 极速做多</span></div>
  <div class="stat-item gray"><span class="stat-num" id="cnt-neutral">0</span><span class="stat-label">⏸ 观望</span></div>
  <div class="stat-item gray" style="min-width:200px;align-items:flex-start;padding:7px 13px;">
    <span style="font-size:11px;color:#7a8fa8;">v4.5 Pro 三周期</span>
    <span style="font-size:10.5px;color:#90a4ae;margin-top:3px;line-height:1.7">
      1h+15m+5m | 极速信号 | 热门榜30
    </span>
  </div>
</div>

<div class="toolbar">
  <label>排序：</label>
  <button class="sort-btn active" id="sort-short" onclick="sortCards('short_score')">空头分↓</button>
  <button class="sort-btn" id="sort-adx" onclick="sortCards('adx')">ADX强度↓</button>
  <button class="sort-btn" id="sort-change" onclick="sortCards('change')">跌幅↓</button>
  <button class="sort-btn" id="sort-fee" onclick="sortCards('fee')">资金费↓</button>
  <label style="margin-left:12px;">筛选：</label>
  <select class="filter-select" id="filter-signal" onchange="filterCards()">
    <option value="all">全部信号</option>
    <option value="flash_short">仅极速做空</option>
    <option value="short">仅做空</option>
    <option value="warn">仅超卖陷阱</option>
    <option value="long">仅做多</option>
    <option value="flash_long">仅极速做多</option>
    <option value="neutral">仅观望</option>
  </select>
  <button class="sort-btn" onclick="loadAllData()" style="margin-left:auto;">🔄 刷新数据</button>
</div>

<div class="legend">
  <span>📊 三周期:</span>
  <span>1h主趋势</span><span>15m入场</span><span>5m极速</span>
  <span>EMA25</span><span>MACD</span><span>RSI</span><span>ST</span><span>ADX</span>
  <span style="color:#00e676;">⚡极速信号=5mRSI超买/超卖+MACD金叉/死叉+趋势共振</span>
</div>

<div class="tabs">
  <button class="tab-btn" style="background:rgba(255,64,129,.12);color:#ff4081;border-color:rgba(255,64,129,.4);" onclick="switchTab('flash_short',this)">⚡ 极速做空 <span id="tab-flash_short-cnt">(0)</span></button>
  <button class="tab-btn active-short" onclick="switchTab('short',this)">📉 做空 <span id="tab-short-cnt">(0)</span></button>
  <button class="tab-btn" onclick="switchTab('warn',this)">⚠️ 超卖陷阱 <span id="tab-warn-cnt">(0)</span></button>
  <button class="tab-btn" onclick="switchTab('long',this)">🚀 做多 <span id="tab-long-cnt">(0)</span></button>
  <button class="tab-btn" style="background:rgba(0,230,118,.12);color:#00e676;border-color:rgba(0,230,118,.4);" onclick="switchTab('flash_long',this)">⚡ 极速做多 <span id="tab-flash_long-cnt">(0)</span></button>
  <button class="tab-btn" onclick="switchTab('all',this)">📋 全部 (<span id="tab-all-cnt">0</span>)</button>
</div>

<div id="tab-flash_short" class="tab-panel">
  <div class="cards-grid" id="grid-flash_short"><div class="loading-msg">正在加载数据...</div></div>
</div>
<div id="tab-short" class="tab-panel active">
  <div class="cards-grid" id="grid-short"><div class="loading-msg">正在加载数据...</div></div>
</div>
<div id="tab-warn" class="tab-panel">
  <div class="cards-grid" id="grid-warn"><div class="loading-msg">正在加载数据...</div></div>
</div>
<div id="tab-long" class="tab-panel">
  <div class="cards-grid" id="grid-long"><div class="loading-msg">正在加载数据...</div></div>
</div>
<div id="tab-flash_long" class="tab-panel">
  <div class="cards-grid" id="grid-flash_long"><div class="loading-msg">正在加载数据...</div></div>
</div>
<div id="tab-all" class="tab-panel">
  <div class="cards-grid" id="grid-all"><div class="loading-msg">正在加载数据...</div></div>
</div>

<script>
// =================== 配置 ===================
// 默认币种，会被动态获取的热门榜覆盖
let SYMBOLS = [
  "BTC","ETH","BNB","SOL","XRP","ADA","DOGE","LTC","AVAX","DOT",
  "MATIC","LINK","UNI","ATOM","NEAR","INJ","ARB","OP","APT","SUI"
];

const BINANCE_REST = "https://fapi.binance.com";
const BINANCE_WS = "wss://fstream.binance.com";

let marketData = [];
let ws = null;
let loadingStartTime = 0;

// =================== 动态获取热门币种（仅币安U本位合约）===================
// 验证币种是否在U本位永续合约中存在且有交易量
async function checkSymbolExists(symbol) {
  try {
    const resp = await fetch(`${BINANCE_REST}/fapi/v1/klines?symbol=${symbol}USDT&interval=1h&limit=5`);
    if (!resp.ok) return false;
    const data = await resp.json();
    // 不仅要存在数据，还要有成交量（过滤退市币种）
    if (!Array.isArray(data) || data.length === 0) return false;
    // 检查最近5根K线是否有成交量
    const hasVolume = data.some(k => parseFloat(k[5]) > 0);
    return hasVolume;
  } catch(e) {
    return false;
  }
}

async function fetchTopSymbols() {
  try {
    // 获取24h所有合约数据
    const resp = await fetch(`${BINANCE_REST}/fapi/v1/ticker/24hr`);
    const all = await resp.json();
    
    if (!Array.isArray(all)) {
      console.error('API返回数据格式错误');
      return SYMBOLS;
    }
    
    // 过滤U本位永续合约
    const usdtPairs = all
      .filter(t => {
        // 必须是USDT结尾
        if (!t.symbol.endsWith('USDT')) return false;
        // 排除季度合约(如BTCUSDT_220925)
        if (t.symbol.includes('_')) return false;
        // 排除币本位合约
        if (t.symbol.endsWith('USD_PERP')) return false;
        // 排除TEST开头的测试合约
        if (t.symbol.startsWith('TEST')) return false;
        // 成交额必须大于100万USDT（过滤小币种）
        const volume = parseFloat(t.volume) * parseFloat(t.lastPrice);
        if (volume < 1000000) return false;
        // 过滤成交量为0的退市币种（通过count判断）
        const count = parseFloat(t.count || 0);
        if (count === 0) return false;
        return true;
      })
      .map(t => ({
        sym: t.symbol.replace('USDT', ''),
        volume: parseFloat(t.volume) * parseFloat(t.lastPrice),
        change: parseFloat(t.priceChangePercent),
        quoteVolume: parseFloat(t.quoteVolume),
        openPrice: parseFloat(t.openPrice),
        lastPrice: parseFloat(t.lastPrice)
      }));
    
    if (usdtPairs.length === 0) {
      console.error('没有找到有效的U本位合约');
      return SYMBOLS;
    }
    
    // 综合得分 = 成交额权重70% + 涨幅权重30%
    const avgVol = usdtPairs.reduce((a,b) => a + b.volume, 0) / usdtPairs.length;
    const avgChg = usdtPairs.reduce((a,b) => a + Math.abs(b.change), 0) / usdtPairs.length;
    
    usdtPairs.forEach(p => {
      p.score = (p.volume / avgVol * 70) + (Math.abs(p.change) / avgChg * 30);
    });
    
    // 排序取前50（预取更多，后面验证）
    usdtPairs.sort((a, b) => b.score - a.score);
    
    // 并发验证每个币种是否存在（最多验证前50个）
    const candidates = usdtPairs.slice(0, 50);
    const validSymbols = [];
    
    // 每批验证5个
    for (let i = 0; i < candidates.length; i += 5) {
      const batch = candidates.slice(i, i + 5);
      const results = await Promise.all(batch.map(p => checkSymbolExists(p.sym)));
      
      batch.forEach((p, idx) => {
        if (results[idx]) {
          validSymbols.push(p);
        }
      });
      
      // 已经有30个有效的就停止
      if (validSymbols.length >= 30) break;
    }
    
    // 取前30个有效的币种
    SYMBOLS = validSymbols.slice(0, 30).map(p => p.sym);
    console.log('✅ 币安U本位合约热门币种:', SYMBOLS.join(', '));
    console.log('   预选:', candidates.length, '验证通过:', SYMBOLS.length);
    return SYMBOLS;
  } catch(e) {
    console.error('❌ 获取热门币种失败:', e);
    return SYMBOLS; // 使用默认
  }
}

// =================== 技术指标计算 ===================
// RSI计算
function calcRSI(prices, period = 14) {
  if (prices.length < period + 1) return 50;
  let gains = [], losses = [];
  for (let i = 1; i < prices.length; i++) {
    const diff = prices[i] - prices[i-1];
    gains.push(diff > 0 ? diff : 0);
    losses.push(diff < 0 ? -diff : 0);
  }
  let avgGain = gains.slice(-period).reduce((a,b)=>a+b,0) / period;
  let avgLoss = losses.slice(-period).reduce((a,b)=>a+b,0) / period;
  if (avgLoss === 0) return 100;
  const rs = avgGain / avgLoss;
  return 100 - (100 / (1 + rs));
}

// 完整EMA计算 - 从数据开头逐步计算
function calcEMA(prices, period) {
  if (prices.length < period) return prices[prices.length-1] || 0;
  const k = 2 / (period + 1);
  // 从第一个价格开始EMA
  let ema = prices[0];
  for (let i = 1; i < prices.length; i++) {
    ema = prices[i] * k + ema * (1 - k);
  }
  return ema;
}

// 完整MACD计算 (12, 26, 9)
function calcMACD(prices) {
  if (prices.length < 50) return { macd: 0, signal: 0, hist: 0 };
  
  // 计算MACD line (EMA12 - EMA26)
  const ema12 = calcEMA(prices, 12);
  const ema26 = calcEMA(prices, 26);
  const macd = ema12 - ema26;
  
  // 计算Signal line (MACD的9日EMA)
  // 需要先生成MACD历史
  const macdLine = [];
  for (let i = 26; i < prices.length; i++) {
    const e12 = calcEMA(prices.slice(0, i+1), 12);
    const e26 = calcEMA(prices.slice(0, i+1), 26);
    macdLine.push(e12 - e26);
  }
  
  // Signal是MACD的9日EMA
  const signal = calcEMA(macdLine, 9);
  const hist = macd - signal;
  
  return { macd, signal, hist };
}

// 布林带
function calcBB(prices, period = 20) {
  if (prices.length < period) return { upper: 0, middle: 0, lower: 0, bandwidth: 0 };
  const slice = prices.slice(-period);
  const sma = slice.reduce((a,b)=>a+b,0) / period;
  const variance = slice.reduce((a,b)=>a + Math.pow(b-sma,2),0) / period;
  const std = Math.sqrt(variance);
  return { upper: sma + 2*std, middle: sma, lower: sma - 2*std, bandwidth: (sma + 2*std - (sma - 2*std)) / sma };
}

// ADX计算 (简化版)
function calcADX(highs, lows, closes, period = 14) {
  if (closes.length < period * 2) return 25;
  let plusDM = [], minusDM = [], tr = [];
  for (let i = 1; i < highs.length; i++) {
    const hDiff = highs[i] - highs[i-1];
    const lDiff = lows[i-1] - lows[i];
    plusDM.push(hDiff > lDiff && hDiff > 0 ? hDiff : 0);
    minusDM.push(lDiff > hDiff && lDiff > 0 ? lDiff : 0);
    tr.push(Math.max(highs[i]-lows[i], Math.abs(highs[i]-closes[i-1]), Math.abs(lows[i]-closes[i-1])));
  }
  const slice = -period;
  const avgTR = tr.slice(slice).reduce((a,b)=>a+b,0) / period;
  const avgPlus = plusDM.slice(slice).reduce((a,b)=>a+b,0) / period;
  const avgMinus = minusDM.slice(slice).reduce((a,b)=>a+b,0) / period;
  if (avgTR === 0) return 25;
  const plusDI = (avgPlus / avgTR) * 100;
  const minusDI = (avgMinus / avgTR) * 100;
  const dx = Math.abs(plusDI - minusDI) / (plusDI + minusDI) * 100;
  return dx; // 简化ADX
}

// Supertrend
function calcSupertrend(highs, lows, closes, period = 10, mult = 3) {
  if (closes.length < period) return "neutral";
  const hl = highs.slice(-period).map((h,i) => h - lows.slice(-period)[i]);
  const atr = hl.reduce((a,b)=>a+b,0) / period * mult;
  const close = closes[closes.length-1];
  const ema = calcEMA(closes, period);
  if (close > ema + atr) return "bull";
  if (close < ema - atr) return "bear";
  return "neutral";
}

// 威廉指标
function calcWR(highs, lows, closes, period = 14) {
  if (closes.length < period) return 50;
  const sliceH = highs.slice(-period);
  const sliceL = lows.slice(-period);
  const sliceC = closes.slice(-period);
  const hh = Math.max(...sliceH), ll = Math.min(...sliceL);
  const c = sliceC[sliceC.length-1];
  return ((hh - c) / (hh - ll)) * -50 + 50;
}

// =================== 信号计算 (三周期版: 1h+15m+5m) ===================
// 综合1小时、15分钟和5分钟周期的指标
// 1h作为主周期判断趋势方向，15m作为入场时机，5m作为极速超短
function calcSignal(d) {
  // 获取各周期指标
  const h1 = d.h1 || {};
  const m15 = d.m15 || {};
  const m5 = d.m5 || {};
  
  // 如果没有有效指标，返回neutral
  if (!h1.rsi && !m15.rsi) return "neutral";
  
  let bearScore = 0, bullScore = 0;
  
  // ====== 1小时周期 (主周期-趋势方向) ======
  const h1_rsi = h1.rsi || 50;
  const h1_adx = h1.adx || 25;
  const h1_macdHist = h1.macd?.hist || 0;
  const h1_st = h1.st || "neutral";
  const h1_ema25 = h1.ema25 || d.price;
  
  // 1h EMA趋势 (15分)
  if (d.price > h1_ema25 * 1.005) bullScore += 15;
  else if (d.price < h1_ema25 * 0.995) bearScore += 15;
  
  // 1h MACD动量 (12分)
  if (h1_macdHist > 0) bullScore += 12;
  else if (h1_macdHist < 0) bearScore += 12;
  
  // 1h Supertrend (8分)
  if (h1_st === "bull") bullScore += 8;
  else if (h1_st === "bear") bearScore += 8;
  
  // 1h ADX强度确认 (5分)
  if (h1_adx >= 30) {
    if (h1_st === "bull") bullScore += 5;
    else if (h1_st === "bear") bearScore += 5;
  }
  
  // 1h RSI摆动 (10分)
  if (h1_rsi < 25) bearScore += 10;
  else if (h1_rsi < 35) bearScore += 5;
  else if (h1_rsi > 75) bullScore += 10;
  else if (h1_rsi > 65) bullScore += 5;
  
  // ====== 15分钟周期 (副周期-入场时机) ======
  const m15_rsi = m15.rsi || 50;
  const m15_adx = m15.adx || 25;
  const m15_macdHist = m15.macd?.hist || 0;
  const m15_st = m15.st || "neutral";
  const m15_ema25 = m15.ema25 || d.price;
  
  // 15m EMA趋势 (8分) - 顺势而为
  if (d.price > m15_ema25) bullScore += 8;
  else bearScore += 8;
  
  // 15m MACD动量 (8分) - 精确入场
  if (m15_macdHist > 0) bullScore += 8;
  else if (m15_macdHist < 0) bearScore += 8;
  
  // 15m Supertrend (5分) - 短期方向
  if (m15_st === "bull") bullScore += 5;
  else if (m15_st === "bear") bullScore += 5;
  
  // 15m RSI (5分) - 超买超卖
  if (m15_rsi < 25) bearScore += 5;
  else if (m15_rsi > 75) bullScore += 5;
  
  // ====== 5分钟周期 (极速超短) ======
  const m5_rsi = m5.rsi || 50;
  const m5_macdHist = m5.macd?.hist || 0;
  const m5_st = m5.st || "neutral";
  
  // 5m RSI极速信号 (6分)
  if (m5_rsi < 20) bearScore += 6;
  else if (m5_rsi < 30) bearScore += 3;
  else if (m5_rsi > 80) bullScore += 6;
  else if (m5_rsi > 70) bullScore += 3;
  
  // 5m MACD极速动量 (6分)
  if (m5_macdHist > 0) bullScore += 6;
  else if (m5_macdHist < 0) bearScore += 6;
  
  // 5m Supertrend极速方向 (4分)
  if (m5_st === "bull") bullScore += 4;
  else if (m5_st === "bear") bearScore += 4;
  
  // ====== 市场情绪因子 ======
  // 资金费率 (8分)
  if (d.fee >= 0.01) bearScore += 8;
  else if (d.fee <= -0.01) bullScore += 8;
  
  // 日线涨跌幅 (4分)
  if (d.chg < -5) bearScore += 4;
  else if (d.chg > 5) bullScore += 4;
  
  // ====== 多周期共振 ======
  // 1h和15m趋势一致时加分
  if (h1_st === m15_st && h1_st !== "neutral") {
    if (h1_st === "bull") bullScore += 10;
    else bearScore += 10;
  }
  
  // 1h和15m RSI同向时加分
  if ((h1_rsi < 35 && m15_rsi < 35) || (h1_rsi > 65 && m15_rsi > 65)) {
    if (h1_rsi < 35) bearScore += 5;
    else bullScore += 5;
  }
  
  // 5m与15m趋势共振加分
  if (m5_st === m15_st && m5_st !== "neutral") {
    if (m5_st === "bull") bullScore += 5;
    else bearScore += 5;
  }
  
  d.bear = Math.min(bearScore, 100);
  d.bull = Math.min(bullScore, 100);
  
  // ==== 市场情绪因子 (权重20%) ====
  // 8. 资金费率 (10分) - 多空博弈
  if (d.fee >= 0.01) bearScore += 10;  // 多头付钱，空头优势
  else if (d.fee >= 0.005) bearScore += 5;
  else if (d.fee <= -0.01) bullScore += 10;  // 空头付钱，多头优势
  else if (d.fee <= -0.005) bullScore += 5;
  
  // 9. 日线涨跌幅 (4分)
  if (d.chg < -5) bearScore += 4;
  else if (d.chg > 5) bullScore += 4;
  
  d.bear = Math.min(bearScore, 100);
  d.bull = Math.min(bullScore, 100);
  
  // 超卖陷阱检测 (做空需谨慎)
  const isSuperOversold = h1_rsi <= 30 && h1_adx >= 25;
  const isStrongBear = bearScore >= 55;
  const isStrongBull = bullScore >= 55;
  
  // ====== 极速信号检测 ======
  // 极速做空: 5分钟RSI超卖 + MACD死叉 + 15分钟趋势向下
  const isFlashShort = m5_rsi <= 25 && m5_macdHist < 0 && m15_st === "bear" && m5_st === "bear";
  // 极速做多: 5分钟RSI超买 + MACD金叉 + 15分钟趋势向上
  const isFlashLong = m5_rsi >= 75 && m5_macdHist > 0 && m15_st === "bull" && m5_st === "bull";
  
  // 优先判断极速信号（最高优先级）
  if (isFlashShort) return "flash_short";
  if (isFlashLong) return "flash_long";
  
  // 超卖陷阱检测
  if (isStrongBear && isSuperOversold && bullScore >= 20) {
    return "warn";
  }
  // 做空信号
  if (isStrongBear && bullScore < 35 && h1_adx >= 20) {
    return "short";
  }
  // 做多信号
  if (isStrongBull && bearScore < 35 && h1_adx >= 20) {
    return "long";
  }
  return "neutral";
}

// ATR计算
function calcATR(d) {
  if (d.high && d.low) return d.high - d.low;
  return d.price * 0.02;
}

// 计算进场点位 - 根据不同信号类型
function calcEntry(d) {
  const price = d.price;
  const h1 = d.h1 || {};
  const m15 = d.m15 || {};
  const m5 = d.m5 || {};
  const sig = d.signal;
  
  // 获取各周期EMA
  const h1_ema = h1.ema25 || price;
  const m15_ema = m15.ema25 || price;
  const m5_ema = m5.ema25 || price;
  
  // 极速信号：使用5分钟EMA作为进场参考
  if (sig === "flash_short" || sig === "flash_long") {
    if (sig === "flash_short") {
      // 极速做空：等价格回抽到5分钟EMA附近进场
      const entry = Math.min(price, m5_ema * 1.002); // 略微高一点
      return entry.toPrecision(8);
    } else {
      // 极速做多：等价格回抽到5分钟EMA附近进场
      const entry = Math.max(price, m5_ema * 0.998); // 略微低一点
      return entry.toPrecision(8);
    }
  }
  
  // 普通信号：使用15分钟EMA作为进场参考
  if (sig === "short") {
    // 做空：等价格回抽到15分钟EMA
    const entry = Math.min(price, m15_ema * 1.003);
    return entry.toPrecision(8);
  } else if (sig === "long") {
    // 做多：等价格回抽到15分钟EMA
    const entry = Math.max(price, m15_ema * 0.997);
    return entry.toPrecision(8);
  }
  
  return price.toPrecision(8);
}

// 止损止盈 - 针对不同信号类型优化
function calcSLTP(d) {
  const price = d.price;
  const atr = calcATR(d);
  const sig = d.signal;
  const h1 = d.h1 || {};
  const m15 = d.m15 || {};
  const m5 = d.m5 || {};
  
  // 获取各周期EMA
  const h1_ema = h1.ema25 || price;
  const m15_ema = m15.ema25 || price;
  const m5_ema = m5.ema25 || price;
  
  // 极速做空：小止损、小止盈（超短线）
  if (sig === "flash_short") {
    // 止损：设在5分钟EMA上方一小段
    const sl = (m5_ema * 1.003).toPrecision(8);
    // 止盈1：1倍ATR
    const tp1 = (price - atr * 1.0).toPrecision(8);
    // 止盈2：1.5倍ATR
    const tp2 = (price - atr * 1.5).toPrecision(8);
    // 止盈3：2倍ATR
    const tp3 = (price - atr * 2.0).toPrecision(8);
    return { entry: calcEntry(d), sl, tp1, tp2, tp3, type: "极速做空" };
  }
  
  // 极速做多：小止损、小止盈（超短线）
  if (sig === "flash_long") {
    const sl = (m5_ema * 0.997).toPrecision(8);
    const tp1 = (price + atr * 1.0).toPrecision(8);
    const tp2 = (price + atr * 1.5).toPrecision(8);
    const tp3 = (price + atr * 2.0).toPrecision(8);
    return { entry: calcEntry(d), sl, tp1, tp2, tp3, type: "极速做多" };
  }
  
  // 普通做空：标准止损止盈
  if (sig === "short") {
    // 止损：设在15分钟EMA上方 + 1倍ATR
    const sl = (m15_ema * 1.005).toPrecision(8);
    // 止盈1：1.5倍ATR
    const tp1 = (price - atr * 1.5).toPrecision(8);
    // 止盈2：2.5倍ATR
    const tp2 = (price - atr * 2.5).toPrecision(8);
    // 止盈3：移动止盈（成本价）
    const tp3 = price.toPrecision(8);
    return { entry: calcEntry(d), sl, tp1, tp2, tp3, type: "做空" };
  }
  
  // 普通做多：标准止损止盈
  if (sig === "long") {
    // 止损：设在15分钟EMA下方 + 1倍ATR
    const sl = (m15_ema * 0.995).toPrecision(8);
    // 止盈1：1.5倍ATR
    const tp1 = (price + atr * 1.5).toPrecision(8);
    // 止盈2：2.5倍ATR
    const tp2 = (price + atr * 2.5).toPrecision(8);
    // 止盈3：移动止盈（成本价）
    const tp3 = price.toPrecision(8);
    return { entry: calcEntry(d), sl, tp1, tp2, tp3, type: "做多" };
  }
  
  return { entry: "--", sl: "--", tp1: "--", tp2: "--", tp3: "--", type: "--" };
}

// 计算风险回报比
function calcRRR(d) {
  const sltp = calcSLTP(d);
  if (!sltp.entry || sltp.entry === "--" || !sltp.sl || sltp.sl === "--") return "--";
  
  const price = d.price;
  const sl = parseFloat(sltp.sl);
  const tp1 = parseFloat(sltp.tp1);
  
  if (sltp.type.includes("做空")) {
    const risk = price - sl;
    const reward = price - tp1;
    if (risk <= 0) return "--";
    return (reward / risk).toFixed(2) + "R";
  } else if (sltp.type.includes("做多")) {
    const risk = sl - price;
    const reward = tp1 - price;
    if (risk <= 0) return "--";
    return (reward / risk).toFixed(2) + "R";
  }
  return "--";
}

// 计算单周期指标
function computeIndicators(klines) {
  if (!klines || klines.length < 50) return null;
  const closes = klines.map(k => k.close);
  const highs = klines.map(k => k.high);
  const lows = klines.map(k => k.low);
  
  return {
    rsi: calcRSI(closes),
    macd: calcMACD(closes),
    ema25: calcEMA(closes, 25),
    bb: calcBB(closes),
    adx: calcADX(highs, lows, closes),
    st: calcSupertrend(highs, lows, closes),
    wr: calcWR(highs, lows, closes)
  };
}

// 计算双周期指标
async function computeDualIndicators(symbol, tickerMap) {
  const [klines1h, klines15m, klines5m] = await Promise.all([
    fetchKlines1h(symbol),
    fetchKlines15m(symbol),
    fetchKlines5m(symbol)
  ]);
  
  const ind1h = computeIndicators(klines1h);
  const ind15m = computeIndicators(klines15m);
  const ind5m = computeIndicators(klines5m);
  
  const t = tickerMap[symbol] || {};
  
  return {
    sym: symbol,
    price: t.price || 0,
    chg: t.chg || 0,
    high: t.high || 0,
    low: t.low || 0,
    vol: t.vol || "0",
    fee: t.fee || 0,
    // 1小时周期指标
    h1: ind1h || {},
    // 15分钟周期指标
    m15: ind15m || {},
    // 5分钟周期指标（超短线）
    m5: ind5m || {}
  };
}

// =================== 主加载 ===================
async function loadAllData() {
  loadingStartTime = Date.now();
  showProgress(0);
  
  // 首先获取热门币种
  document.getElementById("data-status").textContent = "获取热门币种...";
  await fetchTopSymbols();
  showProgress(5);
  
  // 获取24h数据
  document.getElementById("data-status").textContent = "加载1h+15m+5m三周期...";
  const tickerMap = await fetch24hTicker();
  showProgress(15);
  
  // 分批获取双周期K线 (每批3个，减少并发)
  const batchSize = 3;
  const results = [];
  
  for (let i = 0; i < SYMBOLS.length; i += batchSize) {
    const batch = SYMBOLS.slice(i, i + batchSize);
    const promises = batch.map(async (sym) => {
      return await computeDualIndicators(sym, tickerMap);
    });
    
    const batchResults = await Promise.allSettled(promises);
    batchResults.forEach(r => {
      if (r.status === "fulfilled" && r.value) results.push(r.value);
    });
    
    showProgress(15 + (i + batchSize) / SYMBOLS.length * 70);
    
    showProgress(20 + (i + batchSize) / SYMBOLS.length * 60);
  }
  
  marketData = results;
  showProgress(100);
  
  // 计算信号
  marketData.forEach(d => d.signal = calcSignal(d));
  
  // 更新UI
  updateStats();
  renderCards();
  updateFeeAlert();
  connectWebSocket();
  
  const elapsed = ((Date.now() - loadingStartTime) / 1000).toFixed(1);
  document.getElementById("data-status").textContent = `已加载 ${marketData.length}/${SYMBOLS.length} (${elapsed}s)`;
  document.getElementById("last-update").textContent = " | " + new Date().toLocaleTimeString();
  
  setTimeout(() => document.getElementById("progress-bar").classList.remove("show"), 500);
}

function showProgress(pct) {
  document.getElementById("progress-bar").classList.add("show");
  document.getElementById("progress-fill").style.width = pct + "%";
}

// =================== 统计 ===================
function updateStats() {
  const flash_shorts = marketData.filter(d => d.signal === "flash_short");
  const shorts = marketData.filter(d => d.signal === "short");
  const warns = marketData.filter(d => d.signal === "warn");
  const longs = marketData.filter(d => d.signal === "long");
  const flash_longs = marketData.filter(d => d.signal === "flash_long");
  const neutrals = marketData.filter(d => d.signal === "neutral");
  
  document.getElementById("cnt-flash_short").textContent = flash_shorts.length;
  document.getElementById("cnt-short").textContent = shorts.length;
  document.getElementById("cnt-warn").textContent = warns.length;
  document.getElementById("cnt-long").textContent = longs.length;
  document.getElementById("cnt-flash_long").textContent = flash_longs.length;
  document.getElementById("cnt-neutral").textContent = neutrals.length;
  
  document.getElementById("tab-flash_short-cnt").textContent = `(${flash_shorts.length})`;
  document.getElementById("tab-short-cnt").textContent = `(${shorts.length})`;
  document.getElementById("tab-warn-cnt").textContent = `(${warns.length})`;
  document.getElementById("tab-long-cnt").textContent = `(${longs.length})`;
  document.getElementById("tab-flash_long-cnt").textContent = `(${flash_longs.length})`;
  document.getElementById("tab-all-cnt").textContent = marketData.length;
  document.getElementById("sym-count").textContent = marketData.length;
}

function updateFeeAlert() {
  const warnings = [];
  marketData.forEach(d => {
    if (d.fee >= 0.008) warnings.push(`${d.sym} +${d.fee.toFixed(4)}% 多头拥挤`);
    if (d.fee <= -0.015) warnings.push(`${d.sym} ${d.fee.toFixed(4)}% 空头拥挤`);
  });
  const text = warnings.slice(0, 5).join(" | ") || "正常";
  document.getElementById("fee-warn-text").textContent = text;
  if (warnings.length > 0) {
    document.getElementById("fee-alert").classList.add("show");
  }
}

// =================== 渲染 ===================
function renderCards() {
  const flash_shorts = marketData.filter(d => d.signal === "flash_short").sort((a,b) => b.bear - a.bear);
  const shorts = marketData.filter(d => d.signal === "short").sort((a,b) => b.bear - a.bear);
  const warns = marketData.filter(d => d.signal === "warn").sort((a,b) => b.bear - a.bear);
  const longs = marketData.filter(d => d.signal === "long").sort((a,b) => b.bull - a.bull);
  const flash_longs = marketData.filter(d => d.signal === "flash_long").sort((a,b) => b.bull - a.bull);
  const neutrals = marketData.filter(d => d.signal === "neutral").sort((a,b) => b.bear - a.bear);

  document.getElementById("grid-flash_short").innerHTML = flash_shorts.length ? flash_shorts.map(renderCard).join("") : '<div class="empty-msg">暂无极速做空信号</div>';
  document.getElementById("grid-short").innerHTML = shorts.length ? shorts.map(renderCard).join("") : '<div class="empty-msg">暂无做空信号</div>';
  document.getElementById("grid-warn").innerHTML = warns.length ? warns.map(renderCard).join("") : '<div class="empty-msg">暂无超卖陷阱信号</div>';
  document.getElementById("grid-long").innerHTML = longs.length ? longs.map(renderCard).join("") : '<div class="empty-msg">暂无做多信号</div>';
  document.getElementById("grid-flash_long").innerHTML = flash_longs.length ? flash_longs.map(renderCard).join("") : '<div class="empty-msg">暂无极速做多信号</div>';
  document.getElementById("grid-all").innerHTML = [...flash_shorts, ...shorts, ...warns, ...longs, ...flash_longs, ...neutrals].map(renderCard).join("");
}

function renderCard(d) {
  const sig = d.signal;
  const sltp = calcSLTP(d);
  const rrr = calcRRR(d);

  const m15 = d.m15 || {};
  const m5 = d.m5 || {};

  const risk = riskLevel(d);
  const pos = posSize(d);
  const atr = calcATR(d).toPrecision(4);
  
  // 获取周期趋势
  const h1_st = h1.st || "-";

  } else if (sig === "flash_long") {
    cardCls = "card card-flash_long";
    badgeHtml = '<span class="badge long" style="background:rgba(0,230,118,.25);">⚡ 极速做多</span>';

    actionHtml = `
      <div class="action-text" style="color:#00e676;">
        ⚡ <b>极速做多!</b> 5m RSI=<b>${m5_rsi.toFixed(0)}</b> 超买 | MACD=<b>↑</b><br>

      </div>`;

      <span class="sltp-item" style="background:rgba(64,196,255,.1);color:#40c4ff;border:1px solid rgba(64,196,255,.3);">📥 进:${fmtPrice(sltp.entry)}</span>
      <span class="sltp-sl">🛡️ 止损:${fmtPrice(sltp.sl)}</span>
      <span class="sltp-tp">🎯 TP1:${fmtPrice(sltp.tp1)}</span>
    </div>`;
  } else if (sig === "short") {
    cardCls = "card card-short";
    badgeHtml = '<span class="badge short">📉 做空信号</span>';
    actionHtml = `

    entryHtml = `<div class="sltp-row">
      <span class="sltp-item" style="background:rgba(64,196,255,.1);color:#40c4ff;border:1px solid rgba(64,196,255,.3);">📥 进:${fmtPrice(sltp.entry)}</span>

  const m15_macdHist = m15.macd?.hist || 0;
  const m15_rsiCls = m15_rsi <= 30 ? "snap-item highlight" : m15_rsi >= 70 ? "snap-item highlight" : "snap-item";
  const m15_macdColor = m15_macdHist >= 0 ? "var(--green)" : "var(--red)";

  // 5m指标
  const m5_rsi = m5.rsi || 50;
  const m5_macdHist = m5.macd?.hist || 0;

  const m5_macdColor = m5_macdHist >= 0 ? "var(--green)" : "var(--red)";
  const m5_macdSignal = m5_macdHist >= 0 ? "↑" : "↓";

  return `

  </div>
</div>`;
}

// =================== WebSocket 实时更新 ===================
function connectWebSocket() {
  if (ws) { try { ws.close(); } catch(e) {} }
  
  const streams = SYMBOLS.slice(0, 15).map(s => s.toLowerCase() + "usdt@ticker").join("/");
  const wsUrl = `${BINANCE_WS}/stream?streams=${streams}`;
  
  try {
    ws = new WebSocket(wsUrl);
    
    ws.onopen = () => {
      document.getElementById("ws-status").classList.remove("disconnected");
      document.getElementById("ws-status-text")?.remove();
    };
    
    ws.onmessage = (event) => {
      try {
        const msg = JSON.parse(event.data);
        if (msg.data) {
          const d = msg.data;
          const sym = d.s.replace("USDT", "");
          const el = document.getElementById(`price-${sym}`);
          if (el) {
            el.textContent = "$" + formatPrice(parseFloat(d.c));
            el.classList.add("price-updating");
            setTimeout(() => el.classList.remove("price-updating"), 500);
          }
          const chgEl = document.getElementById(`chg-${sym}`);
          if (chgEl) {
            chgEl.textContent = (parseFloat(d.P) >= 0 ? "+" : "") + parseFloat(d.P).toFixed(2) + "%";
            chgEl.className = "change " + (parseFloat(d.P) >= 0 ? "pos" : "neg");
          }
        }
      } catch(e) {}
    };
    
    ws.onclose = () => {
      setTimeout(connectWebSocket, 5000);
    };
  } catch(e) {
    console.error("WebSocket错误:", e);
  }
}

// =================== 工具 ===================
function formatPrice(price) {
  if (!price) return "--";
  if (price >= 1000) return price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
  if (price >= 1) return price.toFixed(2);
  if (price >= 0.01) return price.toFixed(4);
  return price.toFixed(6);
}

function formatVol(vol) {
  if (!vol) return "--";
  const v = parseFloat(vol);
  if (v >= 1e9) return (v / 1e9).toFixed(2) + "B";
  if (v >= 1e6) return (v / 1e6).toFixed(2) + "M";
  if (v >= 1e3) return (v / 1e3).toFixed(2) + "K";
  return vol;
}

// =================== 排序/筛选 ===================
function sortCards(key) {
  document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
  document.getElementById(`sort-${key === "short_score" ? "short" : key}`).classList.add("active");
  
  const map = {
    short_score: (a,b) => (b.bear||0) - (a.bear||0),
    adx: (a,b) => (b.adx||0) - (a.adx||0),
    change: (a,b) => (a.chg||0) - (b.chg||0),
    fee: (a,b) => (b.fee||0) - (a.fee||0)
  };
  
  marketData.sort(map[key] || map.short_score);
  renderCards();
}

function filterCards() {
  const sig = document.getElementById("filter-signal").value;
  const panels = ["flash_short", "short", "warn", "long", "flash_long", "all"];
  panels.forEach(p => {
    const panel = document.getElementById(`grid-${p}`);
    let filtered;
    if (sig === "all") {
      filtered = marketData;
    } else {
      filtered = marketData.filter(d => d.signal === sig);
    }
    if (p === "all") {
      panel.innerHTML = filtered.map(renderCard).join("");
    } else {
      panel.innerHTML = filtered.length ? filtered.map(renderCard).join("") : '<div class="empty-msg">暂无信号</div>';
    }
  });
}

function switchTab(tab, btn) {
  document.querySelectorAll(".tab-btn").forEach(b => b.className = "tab-btn");
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  
  // 根据tab类型设置样式
  if (tab === "flash_short") {
    btn.className = "tab-btn active-short";
  } else if (tab === "flash_long") {
    btn.className = "tab-btn active-long";
  } else if (tab === "short") {
    btn.className = "tab-btn active-short";
  } else if (tab === "warn") {
    btn.className = "tab-btn active-warn";
  } else if (tab === "long") {
    btn.className = "tab-btn active-long";
  } else {
    btn.className = "tab-btn active-all";
  }
  document.getElementById(`tab-${tab}`).classList.add("active");
}

function copyParams(sym, entry, sl, tp1, tp2) {
  const text = `${sym} | 入场: ${entry} | 止损: ${sl} | TP1: ${tp1} | TP2: ${tp2}`;
  navigator.clipboard.writeText(text).then(() => alert("已复制: " + text));
}

// =================== 初始化 ===================
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", loadAllData);
} else {
  loadAllData();
}
